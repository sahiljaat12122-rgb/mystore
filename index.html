<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackBox Store - Modern E-commerce</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f0f 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .header h1 {
            font-size: 3rem;
            background: linear-gradient(45deg, #00d4ff, #ff00ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.5)); }
            to { filter: drop-shadow(0 0 20px rgba(255, 0, 255, 0.5)); }
        }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            padding: 5px;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 15px 30px;
            color: #ccc;
            font-size: 1.1rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .tab-btn.active {
            background: linear-gradient(45deg, #00d4ff, #ff00ff);
            color: white;
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .tab-btn:hover {
            color: white;
            transform: translateY(-2px);
        }

        /* Admin Section */
        .admin-section {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #00d4ff;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #888;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            background: rgba(255, 255, 255, 0.12);
        }

        .add-btn {
            background: linear-gradient(45deg, #00d4ff, #ff00ff);
            border: none;
            padding: 18px 40px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .add-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 212, 255, 0.4);
        }

        /* Products Section */
        .products-section {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00d4ff, #ff00ff, #00ff88);
        }

        .product-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            border-color: rgba(0, 212, 255, 0.3);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .product-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .product-price {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(45deg, #00d4ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #888;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .tabs {
                flex-direction: column;
                align-items: center;
            }

            .tab-btn {
                width: 100%;
                max-width: 300px;
                margin-bottom: 10px;
            }

            .admin-grid {
                grid-template-columns: 1fr;
            }

            .products-section {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 20px;
            }

            .container {
                padding: 10px;
            }
        }

        /* Hidden class */
        .hidden {
            display: none !important;
        }

        /* Loading animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #00d4ff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🛒 BlackBox Store</h1>
            <p>Modern E-commerce Platform</p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showSection('admin')">👨‍💼 Admin Panel</button>
            <button class="tab-btn" onclick="showSection('products')">🛍️ Products</button>
        </div>

        <!-- Admin Section -->
        <div id="admin-section" class="admin-section">
            <h2 style="margin-bottom: 30px; text-align: center; font-size: 2rem;">Add New Product</h2>
            <div class="admin-grid">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="productName" placeholder="Enter product name..." required>
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" id="productPrice" placeholder="0.00" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Product Image URL</label>
                    <textarea id="productImage" rows="3" placeholder="https://example.com/image.jpg" required></textarea>
                </div>
            </div>
            <button class="add-btn" onclick="addProduct()">
                <span id="btn-text">➕ Add Product</span>
                <span id="btn-loading" class="loading hidden"></span>
            </button>
        </div>

        <!-- Products Section -->
        <div id="products-section" class="admin-section hidden">
            <h2 style="margin-bottom: 30px; text-align: center; font-size: 2rem;">Our Products</h2>
            <div id="products-container" class="products-section">
                <div class="empty-state">
                    <h3>📦 No products yet</h3>
                    <p>Add your first product from the Admin Panel!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let products = JSON.parse(localStorage.getItem('products')) || [];

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            renderProducts();
        });

        function showSection(section) {
            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Show/hide sections
            document.getElementById('admin-section').classList.toggle('hidden', section !== 'admin');
            document.getElementById('products-section').classList.toggle('hidden', section !== 'products');
        }

        function addProduct() {
            const name = document.getElementById('productName').value.trim();
            const price = parseFloat(document.getElementById('productPrice').value);
            const image = document.getElementById('productImage').value.trim();

            // Validation
            if (!name || !price || price <= 0 || !image) {
                alert('Please fill all fields with valid data');
                return;
            }

            // Show loading
            const btnText = document.getElementById('btn-text');
            const btnLoading = document.getElementById('btn-loading');
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            // Add product
            const product = {
                id: Date.now(),
                name,
                price,
                image,
                createdAt: new Date().toISOString()
            };

            products.unshift(product);
            localStorage.setItem('products', JSON.stringify(products));

            // Reset form
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productImage').value = '';

            // Hide loading
            setTimeout(() => {
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
                alert('✅ Product added successfully!');
            }, 1000);
        }

        function renderProducts() {
            const container = document.getElementById('products-container');
            
            if (products.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>📦 No products yet</h3>
                        <p>Add your first product from the Admin Panel!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <img src="${product.image}" alt="${product.name}" class="product-image" 
                         onerror="this.src='https://via.placeholder.com/300x200/1a1a1a/888888?text=No+Image'">
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">$${product.price.toFixed(2)}</div>
                </div>
            `).join('');
        }

        // Enter key support
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const activeElement = document.activeElement;
                if (activeElement.id === 'productName' || 
                    activeElement.id === 'productPrice' || 
                    activeElement.id === 'productImage') {
                    addProduct();
                }
            }
        });

        // Auto-save products on page unload
        window.addEventListener('beforeunload', function() {
            localStorage.setItem('products', JSON.stringify(products));
        });
    </script>
</body>
</html>
